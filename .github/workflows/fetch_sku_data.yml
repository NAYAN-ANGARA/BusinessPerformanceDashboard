name: Fetch SKU Ads Data

# ── Schedule: 9 AM IST = 3:30 AM UTC ─────────────────────────────────────────
on:
  schedule:
    - cron: '30 3 * * *'
  workflow_dispatch:

# ── Give the bot write access to push the CSV back ────────────────────────────
permissions:
  contents: write

# ==============================================================================
jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # persist-credentials lets the bot push without a PAT
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests pandas python-dotenv urllib3

      - name: Fetch SKU ads data
        env:
          AMZN_CLIENT_ID:      ${{ secrets.AMZN_CLIENT_ID }}
          AMZN_CLIENT_SECRET:  ${{ secrets.AMZN_CLIENT_SECRET }}
          AMZN_REFRESH_TOKEN:  ${{ secrets.AMZN_REFRESH_TOKEN }}
          AMZN_PROFILE_ID_US:  ${{ secrets.AMZN_PROFILE_ID_US }}
          AMZN_PROFILE_ID_CA:  ${{ secrets.AMZN_PROFILE_ID_CA }}
        run: |
          python sku_data.py \
            --start-date 2026-01-01 \
            --market BOTH \
            --workers 3 \
            --out sku_ads_cache.csv

      - name: Commit updated cache
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sku_ads_cache.csv
          git diff --cached --quiet || git commit -m "chore: refresh SKU ads cache [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
